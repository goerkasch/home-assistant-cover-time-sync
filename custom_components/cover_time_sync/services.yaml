set_known_position:
  description: Set a cover position acquired outside of this integration without triggering movement.
  fields:
    entity_id:
      description: Entity ID of the cover to update.
      example: cover.garage_door
    position:
      description: Position of the cover, between 0 and 100.
      example: 50
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    confident:
      description: Whether the supplied position is confirmed and should not be treated as assumed.
      example: true
      selector:
        boolean:
    position_type:
      description: Whether the supplied position is the target position or the current position.
      example: current
      selector:
        select:
          options:
            - target
            - current
set_known_action:
  description: Set an open, close, or stop action captured outside of Home Assistant without triggering movement.
  fields:
    entity_id:
      description: Entity ID of the cover to update.
      example: cover.garage_door
    action:
      description: Action captured outside of Home Assistant.
      example: open
      selector:
        select:
          options:
            - open
            - close
            - stop
